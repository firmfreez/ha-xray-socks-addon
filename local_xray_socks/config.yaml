name: "Local Xray SOCKS"
version: "0.3.0"
slug: "local_xray_socks"
description: "Xray client that exposes a local SOCKS5 proxy for Keenetic"
url: "https://github.com/firmfreez/ha-xray-socks-addon"
startup: services
boot: auto
init: false
arch:
  - aarch64

ports:
  1080/tcp: 1080
  1080/udp: 1080

ports_description:
  1080/tcp: "SOCKS5 port for Keenetic"
  1080/udp: "SOCKS5 UDP relay for Keenetic"

options:
  protocol: "vless"
  link: ""
  amneziawg_config: ""
  loglevel: "warning"

schema:
  protocol: "list(vless|amneziawg)"
  link: str
  amneziawg_config: str
  loglevel: "list(none|error|warning|info|debug)"

privileged:
  - NET_ADMIN

devices:
  - /dev/net/tun
